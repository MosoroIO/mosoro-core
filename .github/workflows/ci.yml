name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff linter
        run: ruff check .

      - name: Run ruff formatter check
        run: ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/ --cov=mosoro_core --cov=api --cov=gateway --cov-report=term-missing

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Build API image
        run: |
          if [ -f api/Dockerfile.api ]; then
            docker build -f api/Dockerfile.api -t mosoro-api:test . || echo "Dockerfile.api is empty, skipping"
          fi

      - name: Build Gateway image
        run: |
          if [ -f gateway/Dockerfile.gateway ]; then
            docker build -f gateway/Dockerfile.gateway -t mosoro-gateway:test . || echo "Dockerfile.gateway is empty, skipping"
          fi

      - name: Build Agent image
        run: |
          if [ -f agents/Dockerfile.agent ]; then
            docker build -f agents/Dockerfile.agent -t mosoro-agent:test .
          fi

      - name: Build Frontend image
        run: |
          if [ -f frontend/Dockerfile.frontend ]; then
            docker build -f frontend/Dockerfile.frontend -t mosoro-frontend:test . || echo "Dockerfile.frontend build failed, skipping"
          fi

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
