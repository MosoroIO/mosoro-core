# =============================================================================
# Mosoro MQTT Broker Configuration (v1.6)
# Compatible with Mosquitto 2.x
# =============================================================================

# -------------------------- Persistence & Logging ----------------------------
persistence true
persistence_location /mosquitto/data/
log_type all
log_timestamp true
connection_messages true
sys_interval 5

# -------------------------- Listeners ----------------------------------------
# Plain MQTT - Used for local development and internal communication
listener 1883
protocol mqtt
allow_anonymous true

# MQTT over TLS - Primary secure listener (enable for production)
# Uncomment the block below and set allow_anonymous false once certs are in place.
# listener 8883
# protocol mqtt
# cafile /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key
# require_certificate true                  # Enforce client certificates (mTLS)
# use_identity_as_username true             # Use client cert CN as username
# tls_version tlsv1.3                       # Enforce TLS 1.3 (most secure)

# WebSocket over TLS (optional - only enable if dashboard needs it)
# listener 9883
# protocol websockets
# cafile /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key
# require_certificate true
# tls_version tlsv1.3

# -------------------------- Authentication & Authorization -------------------
# For production, set allow_anonymous false and enable password_file + acl_file
# allow_anonymous false
# password_file /mosquitto/config/passwordfile
acl_file /mosquitto/config/aclfile

# -------------------------- Security Hardening -------------------------------
# Limit resources to prevent DoS
max_connections 500
max_inflight_messages 100
max_queued_messages 1000
max_queued_bytes 1048576                    # 1MB

# Message size limits (max_packet_size replaces deprecated message_size_limit)
max_packet_size 65536                       # 64KB max message size

# Keepalive settings
max_keepalive 300

# -------------------------- Performance & Reliability ------------------------
# QoS settings
max_qos 2

# Persistence settings for reliability
autosave_interval 1800                      # Save state every 30 minutes
autosave_on_changes true

# ============================================================================
# IMPORTANT NOTES FOR PRODUCTION
# ============================================================================
# 1. Place valid certificates in ../certs/:
#    - ca.crt     (CA certificate)
#    - server.crt (Server certificate)
#    - server.key (Server private key - keep permissions 600)
#
# 2. Generate passwordfile using:
#    mosquitto_passwd -c /mosquitto/config/passwordfile gateway
#    mosquitto_passwd -b /mosquitto/config/passwordfile api <password>
#
# 3. Uncomment the TLS listener block and set allow_anonymous false.
#
# 4. Consider running Mosquitto behind a reverse proxy or in a dedicated VLAN.
# =============================================================================
