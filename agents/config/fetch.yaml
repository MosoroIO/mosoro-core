# Mosoro Edge Agent Configuration - Fetch Robotics (Zebra)
robot_id: "fetch-001"
vendor: "fetch"

# Fetch/FetchCore connection details (REST API with Bearer token)
api_base_url: "http://192.168.1.210:8080"
api_key: "your-fetch-api-key-here"
api_version: "v1"

# MQTT settings (production: TLS on port 8883)
mqtt_broker: "mosquitto"
mqtt_port: 8883
mqtt_use_tls: true
# mqtt_ca_cert: "/run/secrets/mqtt_ca_cert"       # via Docker secrets
# mqtt_client_cert: "/certs/fetch-001.crt"        # for mTLS
# mqtt_client_key: "/certs/fetch-001.key"         # for mTLS

# Polling and logging
poll_interval: 5.0
log_level: "INFO"
api_timeout: 10.0
max_retries: 3
