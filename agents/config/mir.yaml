# Mosoro Edge Agent Configuration - MiR (Mobile Industrial Robots)
robot_id: "mir-001"
vendor: "mir"

# MiR connection details (REST API with Basic Auth)
api_base_url: "http://192.168.1.200:8080"
username: "admin"
password: "your-mir-password-here"
api_version: "v2.0.0"

# MQTT settings (production: TLS on port 8883)
mqtt_broker: "mosquitto"
mqtt_port: 8883
mqtt_use_tls: true
# mqtt_ca_cert: "/run/secrets/mqtt_ca_cert"       # via Docker secrets
# mqtt_client_cert: "/certs/mir-001.crt"          # for mTLS
# mqtt_client_key: "/certs/mir-001.key"           # for mTLS

# Polling and logging
poll_interval: 5.0
log_level: "INFO"
api_timeout: 10.0
max_retries: 3
