# Mosoro Edge Agent Configuration - Boston Dynamics Stretch
robot_id: "stretch-001"
vendor: "stretch"

# Stretch connection details (adjust based on your deployment)
# Option A: If using ROS 2 bridge
ros_bridge_url: "http://192.168.1.101:9090"
# Option B: If using REST/HTTP wrapper (common in warehouses)
api_base_url: "http://192.168.1.101:5000"

# MQTT settings (production: TLS on port 8883)
mqtt_broker: "mosquitto"
mqtt_port: 8883
mqtt_use_tls: true
# mqtt_ca_cert: "/run/secrets/mqtt_ca_cert"       # via Docker secrets
# mqtt_client_cert: "/certs/stretch-001.crt"      # for mTLS
# mqtt_client_key: "/certs/stretch-001.key"       # for mTLS

# Polling and logging (Stretch benefits from slightly faster polling)
poll_interval: 4.0
log_level: "INFO"
api_timeout: 12.0
max_retries: 3
